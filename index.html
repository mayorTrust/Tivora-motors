
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <title>TIVORA MOTORS | Premium Mobility Showroom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      window.process = window.process || {};
      window.process.env = window.process.env || {};
      if (!window.process.env.API_KEY) {
         window.process.env.API_KEY = "";
      }
      
      // Fallback for client-side environments that might need it
      window.import_meta_env = { VITE_GEMINI_API_KEY: window.process.env.API_KEY };

      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: 'rgb(var(--bg-rgb) / <alpha-value>)',
              foreground: 'rgb(var(--text-rgb) / <alpha-value>)',
              accent: 'var(--accent-hex)',
              'theme-card': 'rgba(var(--text-rgb), var(--glass-bg-opacity))',
              'theme-border': 'rgba(var(--text-rgb), var(--glass-border-opacity))',
              'theme-accent': 'var(--accent-hex)',
              'theme-text': 'rgb(var(--text-rgb))',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Poppins', 'sans-serif'],
              mono: ['Space Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <style>
      /* Base CSS variables handled in index.css */
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.jsx"></script>
  </body>
</html>
